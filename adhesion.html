<form id="adhesionForm">

<input
type="text"
id="nom"
placeholder="Nom et prénom"
required>

<input
type="tel"
id="telephone"
placeholder="Téléphone"
required>

<input
type="email"
id="email"
placeholder="Adresse email">

<select id="commission">

<option value="">
Choisir une commission
</option>

<option>
Communication
</option>

<option>
Organisation
</option>

<option>
Finances
</option>

<option>
Mobilisation
</option>

</select>

<button type="submit">
Envoyer la demande
</button>

</form>

<div id="message"></div>


<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwxpxE6AB4F-JwZBS-zho3pswtjqLnilhZSexh2xpCZy1jt8RAOjn2Dkh_Sqr7pWlkd/exec";

document.getElementById("adhesionForm").addEventListener("submit", function(e){
  e.preventDefault();

  const data = {
    nom: document.getElementById("nom").value,
    telephone: document.getElementById("telephone").value,
    email: document.getElementById("email").value,
    commission: document.getElementById("commission").value
  };

  fetch(API_URL + "?type=adhesion", {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(response => {
    document.getElementById("message").innerHTML =
      "✅ Demande envoyée avec succès !";

    document.getElementById("adhesionForm").reset();
  })
  .catch(err => {
    document.getElementById("message").innerHTML =
      "❌ Erreur lors de l'envoi";
  });
});
</script>
